<!DOCTYPE html>
<html>
<head>
  <title>NodeWatch</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>
  <div class="container">
    <h1><img src="/static/logo.png" alt="NodeWatch Logo" class="logo"> NodeWatch</h1>
    <p>Node Status: <span id="statusIcon" class="status-icon"></span> <span id="statusText">Loading...</span></p>
    <div id="updatedAt" class="updated-at">Last updated at: Loading...</div>
    <div id="logbox" class="logbox">Loading logs...</div>
    
  </div>

  <script>
    function fetchData() {
      fetch('/status')
        .then(res => res.json())
        .then(data => {
          const statusTextEl = document.getElementById('statusText');
          const statusIconEl = document.getElementById('statusIcon');
          const logEl = document.getElementById('logbox');
          const updatedAtEl = document.getElementById('updatedAt');
          
          if (data.status) {
            statusTextEl.textContent = '🟢 Running';
            statusIconEl.className = 'status-icon ok';
          } else {
            statusTextEl.textContent = '🔴 Not running';
            statusIconEl.className = 'status-icon fail';
          }

          const shouldAutoScroll = (logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight) < 10;

          // Convert logs array to string for display
          const logsText = data.logs.join('\n');
          logEl.textContent = logsText;

          if (shouldAutoScroll) {
            logEl.scrollTop = logEl.scrollHeight;
          }

          // Format the timestamp
          const timestamp = new Date(data.last_updated_at).toLocaleString('en-US', {
            timeZone: 'UTC',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
          });
          updatedAtEl.textContent = 'Last updated at: ' + timestamp + ' UTC';
        })
        .catch(error => {
          console.error('Error fetching metrics:', error);
          document.getElementById('statusText').textContent = '❌ Error';
          document.getElementById('logbox').textContent = 'Error fetching data: ' + error.message;
        });
    }

    setInterval(fetchData, 10000);
    fetchData();
  </script>
</body>
</html>
