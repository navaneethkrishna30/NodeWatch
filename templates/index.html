<!DOCTYPE html>
<html>
<head>
  <title>NodeWatch</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; background: #f9f9f9; }
    .ok { color: green; }
    .fail { color: red; }
    pre { background: #111; color: #0f0; padding: 1rem; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>NodeWatch</h1>
  <p>Node Status: <span id="status" class="{{if .StatusOK}}Running{{else}}Stopped{{end}}">Loading...</span></p>
  <pre id="logbox">Loading...</pre>

  <script>
    function fetchData() {
      fetch('/data')
        .then(res => res.json())
        .then(data => {
          const statusEl = document.getElementById('status');
          const logEl = document.getElementById('logbox');
          statusEl.textContent = data.status;
          statusEl.className = data.statusOK ? 'ok' : 'fail';
          logEl.textContent = data.logs;
        });
    }

    setInterval(fetchData, 5000);
    fetchData();
  </script>
</body>
</html>
