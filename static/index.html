<!DOCTYPE html>
<html>
<head>
  <title>NodeWatch</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>
  <div class="container">
    <h1><img src="/static/logo.png" alt="NodeWatch Logo" class="logo"> NodeWatch</h1>
    <p>Node Status: <span id="statusIcon" class="status-icon"></span> <span id="statusText">Loading...</span></p>
    <p>Subscription ID: <span id="subscriptionId">Loading...</span></p>
    <p>Node Type: <span id="nodeType">Loading...</span></p>
    <div id="updatedAt" class="updated-at">Last updated at: Loading...</div>
    <div id="logbox" class="logbox">Loading logs...</div>
    
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
